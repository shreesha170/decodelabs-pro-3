<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
      <button id="themeToggle" class="btn primary">
    🌙 Dark Mode
</button>
        <h2>TASKFLOW</h2>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#tasks">Tasks</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<section id="home" class="hero">
    <h1>Manage Your Tasks Efficiently</h1> <br>
    <p>Stay organized and productive every day.</p>
</section>

<section id="tasks" class="tasks">
    <h2>Add New Task</h2>

    <form id="taskForm">
        <label for="taskInput">Task Name</label>
        <input type="text" id="taskInput" placeholder="Enter task" required maxlength="50" autocomplete="off" 
         aria-label="Task Name">

       <button class="btn primary" type="submit">
    Add Task
</button>
        <p id="error"></p>
    </form>

    <div id="taskList"></div>
</section>

<section id="contact" class="contact">
    <h2>Contact</h2>
    <p>Email: support@taskflow.com</p>
</section>

<footer>
    <p>© 2026 TaskFlow Dashboard</p>
</footer>

<script src="script.js"></script>
</body>
</html>
